# =============================================================================
# values.yaml - Chart sada-bousso-app
# C'est CE fichier qu'Argo CD surveille : le modifier + commit + push
# déclenche automatiquement une nouvelle synchronisation (GitOps).
# =============================================================================
replicaCount: 2

image:
  repository: ghcr.io/<VOTRE-COMPTE-GITHUB>/sada-bousso-app
  tag: "1.1.0"
  pullPolicy: IfNotPresent

appVersion: "1.1.0"

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

namespace: sada-bousso

name: CI - build, tests, helm lint, scan, push

on:
  push:
    branches: [ "main" ]
    paths:
      - "app.py"
      - "requirements.txt"
      - "Dockerfile"
      - "helm-chart/**"
      - ".github/workflows/ci.yaml"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sada-bousso-app

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Récupération du code (commit)
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances et lancer les tests
        run: |
          pip install -r requirements.txt pytest
          pytest -v

      - name: Installer Helm
        uses: azure/setup-helm@v4

      - name: Lint du chart Helm
        run: helm lint ./helm-chart

      - name: Connexion au registre GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construire l'image Docker
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .

      - name: Scan de vulnérabilités (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"   # passer à "1" pour bloquer la CI si vulnérabilités critiques

      - name: Publier l'image sur le registre
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
